<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Biome React No Effect Logo</title>
  <desc>Professional modern logo combining a Biome triangle, React atom, and a minimal lightning bolt.</desc>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="white"/>

  <!-- Biome triangle -->
  <path d="M256 108L382 332H130L256 108Z" fill="#7BC043" opacity="0.18"/>

  <!-- React atom -->
  <g stroke="#61DAFB" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="256" cy="256" rx="150" ry="58"/>
    <ellipse cx="256" cy="256" rx="150" ry="58" transform="rotate(60 256 256)"/>
    <ellipse cx="256" cy="256" rx="150" ry="58" transform="rotate(120 256 256)"/>
  </g>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="18" fill="#61DAFB"/>

  <!-- Minimal effect / lightning -->
  <path d="M286 166L228 250H265L228 346L311 236H272L286 166Z" fill="#1F2937"/>
</svg>
